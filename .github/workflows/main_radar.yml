name: Workflow_Radar_V1

on:
  schedule:
    # S'exécute à la minute 0 de chaque heure (ex: 13:00, 14:00...)
    - cron: '0 * * * *'
  # Permet de lancer le radar manuellement pour tester
  workflow_dispatch:

jobs:
  job-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code du depot
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les bibliotheques
        run: pip install -U google-generativeai python-telegram-bot requests beautifulsoup4

      - name: Executer le script Radar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python PROJET_RADAR_V1.py 